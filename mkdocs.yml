site_name: Orders Manager One For All
site_description: Documentation and wiki for the Orders Manager One For All MT5 EA
site_author: Matta
site_url: https://cgMatta.github.io/orders-manager-one-for-all-wiki

repo_name: orders-manager-one-for-all-wiki
repo_url: https://github.com/cgMatta/orders-manager-one-for-all-wiki

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Panels:
    - Main Panel: panels/main.md
    - Easy Order: panels/easy-order.md
    - Order List: panels/order-list.md
  - Configuration: inputs.md
  - Changelog: changelog.md
  - FAQ: faq.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cgMatta/orders-manager-one-for-all-wiki

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
